
services:
  backend:
    container_name: noteflow-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BASE_REGISTRY: ${BASE_REGISTRY:-docker.io}
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX: ${PIP_INDEX:-https://pypi.tuna.tsinghua.edu.cn/simple}
    image: ghcr.io/super-mortal/noteflow-backend:latest
    env_file:
      - .env
    environment:
      - BACKEND_PORT=${BACKEND_PORT}
      - BACKEND_HOST=${BACKEND_HOST}
    volumes:
      # 本地开发时挂载整个目录支持热重载；生产部署无需挂载（镜像已包含代码）
      - ./backend:/app
    expose:
      - "${BACKEND_PORT}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/api/sys_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 4g

  frontend:
    container_name: noteflow-frontend
    build:
      context: .
      dockerfile: noteflow_frontend/Dockerfile
      args:
        BASE_REGISTRY: ${BASE_REGISTRY:-docker.io}
    image: ghcr.io/super-mortal/noteflow-frontend:latest
    env_file:
      - .env
    expose:
      - "80"
    restart: unless-stopped
    mem_limit: 512m

  nginx:
    container_name: noteflow-nginx
    image: nginx:1.25-alpine
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    mem_limit: 256m

  watchtower:
    container_name: noteflow-watchtower
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - DOCKER_API_VERSION=1.40
    command: noteflow-backend noteflow-frontend noteflow-nginx
    restart: unless-stopped
    mem_limit: 64m
